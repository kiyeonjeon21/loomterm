#:schema https://developers.openai.com/codex/config-schema.json

[mcp_servers.loomterm]
command = "cargo"
args = ["run", "--quiet", "--release", "--bin", "loom-mcp"]
cwd = "."
env_vars = ["LOOMTERM_CONFIG", "LOOMTERM_STATE_DIR", "LOOMTERM_RUNTIME_DIR"]
startup_timeout_sec = 60
tool_timeout_sec = 90
required = true
default_tools_approval_mode = "writes"
