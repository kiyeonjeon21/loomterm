name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          test -n "$version"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            test "$GITHUB_REF_NAME" = "v$version"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - run: cargo test --all-targets --locked
      - run: cargo build --release --locked --bins
      - name: Package and smoke test
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          package="loomterm-v${VERSION}-${TARGET}"
          mkdir -p "dist/$package"
          for binary in loom loomd loom-mcp loom-supervisor; do
            cp "target/release/$binary" "dist/$package/"
            "dist/$package/$binary" --version
          done
          cp LICENSE THIRD_PARTY_NOTICES.md README.md "dist/$package/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"
          rm -rf "dist/$package"
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: loomterm-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [validate, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: loomterm-*
          path: dist
          merge-multiple: true
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cd dist
          sha256sum ./*.tar.gz > SHA256SUMS
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --verify-tag --prerelease --generate-notes \
            --title "Loomterm $TAG" ./*.tar.gz ./SHA256SUMS
